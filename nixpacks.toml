# Nixpacks config para monorepo Turborepo + Coolify
# O install roda na raiz para resolver pacotes workspace locais (@pleno-crm/types)
# O build e start delegam para o workspace apps/web

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npx prisma generate --schema=apps/web/prisma/schema.prisma && npm run build --workspace=@pleno-crm/web",
]

# O migrate deploy roda no boot do container (com acesso ao banco de producao),
# logo antes do start. As fases [phases.*] rodam em build da imagem, sem banco.
[start]
cmd = "npx prisma migrate deploy --schema=apps/web/prisma/schema.prisma && npm run start --workspace=@pleno-crm/web"
